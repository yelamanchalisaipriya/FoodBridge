<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate Food - FoodBridge</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- ================= NAVBAR ================= -->

    <nav>
        <div class="logo">
            <h2>FoodBridge</h2>
        </div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="donate-food.html">Donate Food</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>


    <!-- ================= DONATE FOOD SECTION ================= -->

    <section class="donate-container">

        <h1>Donate Food</h1>

        <p>
            Share your surplus food and make a difference
            in someone's life today.
        </p>

        <form>

            <!-- Food Name -->

            <label>Food Name</label><br>
            <input type="text"
                   placeholder="Enter food name"
                   required>
            <br><br>


            <!-- Quantity -->

            <label>Quantity (Number of Meals)</label><br>
            <input type="number"
                   placeholder="Example: 50"
                   required>
            <br><br>


            <!-- Food Type -->

            <label>Food Type</label><br>

            <select required>
                <option value="">Select Food Type</option>
                <option>Vegetarian</option>
                <option>Non-Vegetarian</option>
                <option>Both</option>
            </select>

            <br><br>


            <!-- Preparation Time -->

            <label>Food Prepared Time</label><br>
            <input type="time" required>
            <br><br>


            <!-- Expiry Time -->

            <label>Food Expiry Time</label><br>
            <input type="time" required>
            <br><br>


            <!-- Pickup Address -->

            <label>Pickup Address</label><br>

            <textarea rows="4"
                      placeholder="Enter pickup address"
                      required></textarea>

            <br><br>


            <!-- Contact Number -->

            <label>Contact Number</label><br>
            <input type="tel"
                   placeholder="Enter your phone number"
                   required>

            <br><br>


            <!-- Upload Image -->

            <label>Upload Food Image</label><br>
            <input type="file"
                   accept="image/*">

            <br><br>


            <!-- Special Instructions -->

            <label>Special Instructions</label><br>

            <textarea rows="4"
                      placeholder="Any special instructions?"></textarea>

            <br><br>


            <!-- Submit Button -->

            <button type="submit">
                Donate Now
            </button>

        </form>

    </section>



    <!-- ================= FOOTER ================= -->

    <footer>

        <p>
            © 2026 FoodBridge. All Rights Reserved.
        </p>

    </footer>


    <!-- JavaScript File -->

    <script src="js/script.js"></script>

</body>
</html>
