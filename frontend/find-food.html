<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Find Food - FoodBridge</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>


    <!-- NAVBAR -->

    <nav>

        <div class="logo">
            <h2>FoodBridge</h2>
        </div>

        <ul>

            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="donate-food.html">Donate Food</a></li>
            <li><a href="find-food.html">Find Food</a></li>
            <li><a href="login.html">Login</a></li>

        </ul>

    </nav>




    <!-- FIND FOOD -->

    <section class="find-food">

        <h1>Available Food Donations</h1>

        <p>
            Browse available food donations.
        </p>

        <div id="foodContainer">

        </div>


    </section>




    <!-- FOOTER -->

    <footer>

        <p>
            © 2026 FoodBridge.
            All Rights Reserved.
        </p>

    </footer>




    <!-- JAVASCRIPT -->


    <script>


        async function loadFood() {


            const response = await fetch(

                "https://foodbridge-whsc.onrender.com/find-food"

            );


            const donations =
                await response.json();



            const container =
                document.getElementById("foodContainer");



            donations.forEach(function (food) {


                container.innerHTML += `

            <div class="food-card">

            <h2>${food.foodName}</h2>

            <p>
            <strong>Quantity :</strong>
            ${food.quantity}
            </p>


            <p>
            <strong>Food Type :</strong>
            ${food.foodType}
            </p>


            <p>
            <strong>Prepared Time :</strong>
            ${food.preparedTime}
            </p>


            <p>
            <strong>Expiry Time :</strong>
            ${food.expiryTime}
            </p>


            <p>
            <strong>Address :</strong>
            ${food.address}
            </p>


            <p>
            <strong>Phone :</strong>
            ${food.phone}
            </p>


            <p>
            <strong>Instructions :</strong>
            ${food.instructions}
            </p>


            <button>

            Request Food

            </button>


            </div>

            <br>

            `;


            });


        }


        loadFood();


    </script>


</body>

</html>
