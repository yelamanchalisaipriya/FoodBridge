<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FoodBridge</title>

    <!-- CSS File -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav>
        <div class="logo">
            <h2>FoodBridge</h2>
        </div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="register.html">Register</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </nav>


    <!-- ================= REGISTER SECTION ================= -->

    <section class="register-container">

        <h1>Create Your Account</h1>

        <p>
            Join FoodBridge and become a part of our mission
            to reduce food waste and fight hunger.
        </p>

        <form onsubmit="event.preventDefault(); checkPassword(
document.getElementById('password').value,
document.getElementById('confirmPassword').value
)">

            <!-- Full Name -->
            <label>Full Name</label><br>
            <input type="text" id="name" placeholder="Enter your full name" required>


            <!-- Email -->
            <label>Email Address</label><br>
            <input type="email" id="email" placeholder="Enter your email" required>
            <br><br>


            <!-- Phone Number -->
            <label>Phone Number</label><br>
            <input type="tel" id="phone" placeholder="Enter your phone number" required>
            <br><br>


            <!-- Password -->
            <label>Password</label><br>
            <input type="password" id="password" placeholder="Create a password" required>
            <br><br>


            <!-- Confirm Password -->
            <label>Confirm Password</label><br>
            <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
            <br><br>


            <!-- User Role -->
            <label>Select Your Role</label><br>

            <select required id="role">
                <option value="">Choose Role</option>
                <option>Donor</option>
                <option>Receiver</option>
                <option>Volunteer</option>
                <option>Admin</option>
            </select>

            <br><br>


            <!-- Address -->
            <label>Address</label><br>
            <textarea rows="4" id="address" placeholder="Enter your address" required></textarea>

            <br><br>


            <!-- Register Button -->
            <button type="button" onclick="registerUser()">

                Register

            </button>

        </form>

        <br>

        <p>
            Already have an account?
            <a href="login.html">Login Here</a>
        </p>

    </section>


    <!-- ================= FOOTER ================= -->

    <footer>

        <p>
            © 2026 FoodBridge. All Rights Reserved.
        </p>

    </footer>


    <!-- JavaScript File -->

    <script src="js/script.js"></script>

    <script>

        async function registerUser() {

            const name =
                document.getElementById("name").value;

            const email =
                document.getElementById("email").value;

            const phone =
                document.getElementById("phone").value;

            const password =
                document.getElementById("password").value;

            const confirmPassword =
                document.getElementById("confirmPassword").value;

            const role =
                document.getElementById("role").value;

            const address =
                document.getElementById("address").value;



            const response = await fetch(
                "https://foodbridge-whsc.onrender.com/register",

                {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({

                        name,
                        email,
                        phone,
                        password,
                        confirmPassword,
                        role,
                        address

                    })

                });



            const message = await response.text();

            alert(message);


        }

    </script>
</body>

</html>
